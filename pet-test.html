<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Test</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: transparent; overflow: hidden; }
      body { 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        width: 100vw; 
        height: 100vh;
      }
      img {
        width: 120px;
        height: 120px;
        object-fit: contain;
        border: 2px solid red;
      }
    </style>
  </head>
  <body>
    <img src="/cat/frames/idle/001.png" alt="cat test" />
    <script>
      console.log('Pet test page loaded');
      // 报告图片加载状态
      document.querySelector('img').onload = () => console.log('IMG LOADED');
      document.querySelector('img').onerror = () => console.log('IMG ERROR');
    </script>
  </body>
</html>
